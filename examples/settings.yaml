debug: false
http_timeout: 45
http_verify: false

database:
  main:
    endpoint_url: "postgresql://localhost:5432/app"

llm_oidc:
  default:
    endpoint_url: "https://example.com/oidc"
    issuer: "https://issuer.example.com"
    client_id: "client-id"
    client_secret: "client-secret"
    scopes: "openid profile"

cache:
  type: redis
  redis:
    master: "mymaster"
    sentinels: "redis-ha:26379"
    expiry_time: 60

open_telemetry_settings:
  enable_otel: false
  otel_excluded_urls: "/health,/metrics,/openapi_json,/version"

server_host: "0.0.0.0"
server_port: 5000
log_level: "INFO"
